[paths]
raw_data_path = data/raw/diabetes.csv
processed_data_dir = data/processed
train_data_path = data/processed/train.csv
valid_data_path = data/processed/valid.csv
test_data_path = data/processed/test.csv

experiments_dir = experiments
best_model_path = experiments/best_model/model.joblib
best_validation_metrics_path = experiments/best_model/validation_metrics.json
best_test_metrics_path = experiments/best_model/test_metrics.json

[training]
target_column = outcome
train_size = 0.7
valid_size = 0.15
test_size = 0.15
random_state = 57
selection_metric = f1_score

[preprocessing]
zero_as_missing_columns = glucose,blood_pressure,skin_thickness,insulin,bmi

[model]
selected_model_name = LogisticRegressionTuned