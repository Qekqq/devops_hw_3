[paths]
raw_data_path = data/raw/diabetes.csv
processed_data_path = data/processed/diabetes_processed.csv
experiments_dir = experiments
best_model_path = experiments/best_model/model.joblib
best_metrics_path = experiments/best_model/metrics.json

[training]
target_column = Outcome
train_size = 0.7
valid_size = 0.15
test_size = 0.15
random_state = 57
selection_metric = f1

[logistic_regression]
max_iter = 1000
solver = liblinear

[decision_tree]
max_depth = 4
criterion = gini