services:
  diabetes-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_hw_3_api
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      VAULT_ADDR: http://vault:8200
      VAULT_KV_MOUNT: secret
      VAULT_DB_SECRET_PATH: database/postgres
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: devops_hw_3_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.17
    container_name: devops_hw_3_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    env_file:
      - .env
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  vault-init:
    image: hashicorp/vault:1.17
    container_name: devops_hw_3_vault_init
    env_file:
      - .env
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_KV_MOUNT: secret
      VAULT_DB_SECRET_PATH: database/postgres
    volumes:
      - ./vault/init-vault.sh:/vault/init-vault.sh:ro
    entrypoint: ["/bin/sh", "/vault/init-vault.sh"]
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata: